        document.getElementById('startBtn').addEventListener('click', async function() {
            if (!confirm('기존 데이터를 삭제하고 새로 Import 하시겠습니까?')) return;

            const btn = this;
            btn.disabled = true;
            btn.textContent = '진행 중...';

            const progressContainer = document.getElementById('progressContainer');
            const progressFill = document.getElementById('progressFill');
            const status = document.getElementById('status');

            progressContainer.style.display = 'block';

            try {
                status.textContent = '기존 데이터 삭제 중...';
                const response = await fetch('tables/resume?limit=1000');
                const data = await response.json();
                
                if (data.data && data.data.length > 0) {
                    for (const item of data.data) {
                        await fetch(`tables/resume/${item.id}`, { method: 'DELETE' });
                        await new Promise(resolve => setTimeout(resolve, 30));
                    }
                }

                let successCount = 0;
                for (let i = 0; i < resumeData.length; i++) {
                    const progress = Math.round(((i + 1) / resumeData.length) * 100);
                    progressFill.style.width = progress + '%';
                    progressFill.textContent = progress + '%';
                    status.textContent = `${i + 1}/${resumeData.length} Import 중...`;

                    const res = await fetch('tables/resume', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(resumeData[i])
                    });

                    if (res.ok) successCount++;
                    await new Promise(resolve => setTimeout(resolve, 60));
                }

                progressFill.style.width = '100%';
                progressFill.textContent = '100%';
                status.className = 'status success';
                status.innerHTML = `
                    완료 ${successCount}개 항목 Import 성공<br><br>
                    <a href="resume.html" class="link-btn">Resume 확인</a>
                    <a href="admin-simple.html" class="link-btn" style="background: #667eea; margin-left: 10px;">관리자 페이지</a>
                `;
                btn.textContent = '완료';
            } catch (error) {
                status.textContent = '오류 발생: ' + error.message;
                btn.disabled = false;
                btn.textContent = '다시 시도';
            }
        });
