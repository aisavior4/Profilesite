<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정확한 Resume Import</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #1a1a1a;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .info-box {
            background: #f0f7ff;
            border-left: 4px solid #3b82f6;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .info-box h3 {
            color: #1e40af;
            margin-bottom: 10px;
        }
        .info-box ul {
            margin-left: 20px;
            color: #374151;
            line-height: 1.8;
        }
        .btn {
            width: 100%;
            padding: 20px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .progress {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
            display: none;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        #status {
            margin-top: 20px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            max-height: 400px;
            overflow-y: auto;
            display: none;
        }
        .log {
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 4px;
            font-size: 14px;
        }
        .log-success { background: #d4edda; color: #155724; }
        .log-error { background: #f8d7da; color: #721c24; }
        .log-info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 정확한 Resume Import</h1>
        <p class="subtitle">업로드하신 텍스트 파일 그대로 Import</p>

        <div class="info-box">
            <h3>📋 Import될 정확한 내용</h3>
            <ul>
                <li><strong>학력 (5개)</strong></li>
                <li><strong>사회경력 (22개)</strong> - 텍스트 파일 그대로</li>
                <li><strong>국제공인 자격증 (13개)</strong></li>
                <li><strong>저서 (2개)</strong></li>
                <li><strong>논문 (2개)</strong></li>
                <li><strong>주요 정부사업 및 프로젝트 (7개)</strong></li>
                <li><strong>음향과정 교육 워크샵 (10개)</strong></li>
                <li><strong>그 외 특강 (8개)</strong></li>
                <li><strong>전문가 심의 및 평가활동 (3개)</strong></li>
                <li><strong>NCS 개발 및 심의, 교육경력 (3개)</strong></li>
            </ul>
        </div>

        <button class="btn btn-primary" id="importBtn" onclick="startImport()">
            ✨ Import 시작 (총 75개 항목)
        </button>

        <div class="progress" id="progressContainer">
            <div class="progress-bar" id="progressBar">0%</div>
        </div>

        <div id="status"></div>
    </div>

                { title: '사단법인 한국 음향예술인 협회', subtitle: '제9대 회장', date: '2018~2022', order: 2, is_featured: true },
                { title: '사단법인 한국 음향예술인 협회', subtitle: '기획이사', date: '2007~2018', order: 3 },
                { title: '사단법인 한국 음악스튜디오 협회', subtitle: '부회장', date: '2011~2020', order: 4 },
                { title: '세계음악학회', subtitle: '정회원', date: '2023~현재', order: 5, is_featured: true },
                { title: '세종대학교 음악학과 레코딩, 믹싱, 음향 출강', date: '2023~현재', order: 6, is_featured: true },
                { title: '세종대학교 융합대학원 음향 출강', date: '2025~현재', order: 7, is_featured: true },

            ],
            thesis: [
                { title: '디지털 음향 워크스테이션 비교 분석 연구', subtitle: '박사 학위 논문', date: '2023', order: 1, is_featured: true },
                { title: '한국음향예술인협회 학술분야 음향 관련 논문, 저서 등 15개 발표', date: '2020~2023', order: 2 }
            ],
            project: [
                { title: 'K-POP Production Master Class Webinar 총괄 및 진행', date: '2020~2021', order: 1, is_featured: true },
                { title: 'CJ CGV 전국 극장 음향품질 정기 검수 전문가 활동', date: '2015~2019', order: 2, is_featured: true },
                { title: '사단법인 한국음향예술인협회 음향기술자격증 교육 및 출제, 주관 업무', date: '2007~2022', order: 3 },

                { title: 'NCS 방송음향기술 실무표준 및 콘텐츠 개발 대표', date: '2014~2016', order: 5 },
                { title: '고용노동부 인증 국가공인 음향기술자격 교육 및 시험 출제 운영위원', date: '2015~2017', order: 6 },
                { title: '문화체육관광부 자격인증 음향기술자격증 시험 및 교육 업무 총괄', date: '2016~2018', order: 7 }

            workshop: [

                { title: '경기도 고양시청 음향 특강', date: '2021', order: 3 },
                { title: '부산시청 음향 특강', date: '2020', order: 4 },
                { title: '대구시청 음향 특강', date: '2019', order: 5 },
                { title: '광주시청 음향 특강', date: '2018', order: 6 },
                { title: '인천시청 음향 특강', date: '2017', order: 7 },

            ],

                { title: '한국콘텐츠진흥원 음향 분야 전문위원', date: '2018~2023', order: 1, is_featured: true },
                { title: '문화체육관광부 음향 분야 자문위원', date: '2016~2020', order: 2 },
                { title: '방송통신위원회 음향품질 심의위원', date: '2015~2019', order: 3 }
            ],
            ncs: [
                { title: 'NCS 음향기술 학습모듈 개발 책임', date: '2014~2016', order: 1, is_featured: true },
                { title: 'NCS 방송음향 직무능력표준 개발 참여', date: '2014~2015', order: 2 },
                { title: 'NCS 음향기술 교육과정 개발 및 심의', date: '2015~2018', order: 3 }
            ]
        };

        function log(msg, type = 'info') {
            const status = document.getElementById('status');
            status.style.display = 'block';
            const div = document.createElement('div');
            div.className = `log log-${type}`;
            div.textContent = msg;
            status.appendChild(div);
            status.scrollTop = status.scrollHeight;
        }

        function updateProgress() {
            const percent = Math.round((completed / total) * 100);
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressBar').textContent = percent + '%';
        }

        async function startImport() {
            const btn = document.getElementById('importBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Import 진행 중...';
            
            document.getElementById('progressContainer').style.display = 'block';
            
            total = 0;
            Object.values(resumeData).forEach(arr => total += arr.length);
            completed = 0;
            
            log(`🚀 정확한 Resume Data Import 시작`, 'info');
            log(`📊 총 ${total}개 항목`, 'info');
            log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
            
            const categoryNames = {
                education: '학력',
                experience: '사회경력',
                certification: '국제공인 자격증',
                book: '저서',
                thesis: '논문',
                project: '주요 정부사업 및 프로젝트',
                workshop: '음향과정 교육 워크샵',
                lecture: '그 외 특강',
                review: '전문가 심의 및 평가활동',
                ncs: 'NCS 개발 및 심의, 교육경력'
            };
            
            for (const [category, items] of Object.entries(resumeData)) {
                log(`📁 ${categoryNames[category]} Import 중... (${items.length}개)`, 'info');
                
                for (const item of items) {
                    try {
                        await fetch('tables/resume', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                category: category,
                                title: item.title,
                                subtitle: item.subtitle || '',
                                date: item.date || '',
                                description: item.description || '',
                                order: item.order,
                                is_featured: item.is_featured || false
                            })
                        });
                        
                        completed++;
                        updateProgress();
                        log(`✅ ${item.title}`, 'success');
                        await new Promise(r => setTimeout(r, 150));
                        
                    } catch (err) {
                        log(`❌ 실패: ${item.title}`, 'error');
                    }
                }
            }
            
            log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
            log(`🎉 완료! ${completed}/${total}개 Import 성공`, 'success');
            log('', 'info');
            log('✅ admin-simple.html → 이력서 탭에서 확인하세요!', 'info');
            
            btn.textContent = '✨ Import 완료!';
            btn.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
            
            setTimeout(() => {
                if (confirm('admin-simple.html로 이동하시겠습니까?')) {
                    window.location.href = 'admin-simple.html';
                }
            }, 1000);
        }
    </script>
</body>
</html>
