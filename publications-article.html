<!DOCTYPE html>
<html lang="ko">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
<script src="js/firebase-adapter.js"></script>
<style>
    /* 🔥 1. 제목 위쪽의 쓸데없는 여백 줄이기 (사진의 'X' 부분 해결) */
    body {
        background-color: #ffffff !important;
        padding-top: 80px !important; /* 네비게이션 바 높이만 남기고 확 줄였습니다 */
    }

    section {
        padding-top: 10px !important; /* 템플릿 기본값인 거대한 상단 여백 제거 */
    }

    /* 🔥 2. 제목과 아래 사진들 사이의 거대 여백 줄이기 (사진의 'O' 부분 해결) */
    .section-header {
        margin-bottom: 30px !important; /* 원래 64px(4rem)이던 간격을 반으로 확 줄였습니다 */
    }

    /* ----------------------------------------------------------------- */
    /* 아래부터는 형준님이 직접 튜닝하신 완벽한 코드 원본 그대로입니다! */
    /* ----------------------------------------------------------------- */

    /* 2. 라이트박스(상세보기) 전체 영역 설정 */
    #lightbox, .lightbox {
        background-color: rgba(255, 255, 255, 0.98) !important;
        z-index: 9999 !important;
        display: none; /* 기본은 숨김 (스크립트가 작동함) */
        position: fixed !important;
        top: 0; left: 0; width: 100%; height: 100%;
    }

    /* 활성화되었을 때만 보임 */
    #lightbox.active, .lightbox.active {
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        justify-content: flex-start !important;
        overflow-y: auto !important; /* 내용이 길면 스크롤 가능하게 */
    }

    /* 3. 상세 내용 박스 (폭 제한 및 가시성 확보) */
    .lightbox-content {
        max-width: 500px !important; /* 문장 폭 줄이기 */
        width: 70% !important;
        margin: 80px auto !important;
        background: white !important;
        padding: 50px !important;
        display: block !important; /* 내용 강제 노출 */
        opacity: 1 !important;
        position: relative !important;
    }

    /* 4. 이미지 및 텍스트 색상 (까마귀 탈출) */
    #lightboxImage {
        max-width: 100% !important;
        height: auto !important;
        display: block !important;
        margin: 0 auto 30px auto !important;
        border-radius: 8px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .lightbox-caption {
        text-align: left !important;
    }

    #lightboxTitle, #lightboxDescription, .lightbox-caption h3, .lightbox-caption p {
        color: #1a1a1a !important; /* 진한 검정색 */
        line-height: 1.8 !important;
        text-shadow: none !important;
        display: block !important;
    }

    /* 5. 이전/다음 버튼 - 상세 내용 하단 중앙에 배치 */
    .lightbox-prev, .lightbox-next {
        position: fixed !important; /* 화면 하단에 고정 */
        bottom: 30px !important;
        width: 30px !important;
        height: 30px !important;
        background: #1a1a1a !important; /* 세련된 블랙 버튼 */
        color: #ffffff !important;
        border-radius: 50% !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        border: none !important;
        font-size: 24px !important;
        cursor: pointer !important;
        z-index: 10000 !important;
        transition: transform 0.2s ease;
    }

    /* 버튼 좌우 간격 (가운데로 모으기) */
    .lightbox-prev { left: calc(50% - 80px) !important; }
    .lightbox-next { left: calc(50% + 20px) !important; }

    .lightbox-prev:hover, .lightbox-next:hover {
        transform: scale(1.1);
        background: #d4a574 !important; /* 포인트 컬러 */
    }

    /* 닫기 버튼 스타일 */
    .lightbox-close {
        position: fixed !important;
        top: 30px !important;
        right: 30px !important;
        color: #333 !important;
        font-size: 40px !important;
        z-index: 10001 !important;
    }
</style>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기사 및 미디어 - 임형준</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:wght@400;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="nav">
        <div class="container nav-container">
            <a href="index.html" class="nav-brand"><i class="fas fa-home"></i></a>
            <ul class="nav-menu" style="list-style: none !important; padding: 0; margin: 0;">
                <li style="list-style: none !important;"><a href="index.html#home">Home</a></li>
                <li style="list-style: none !important;"><a href="index.html#about">About</a></li>
                <li style="list-style: none !important;"><a href="index.html#expertise">Expertise</a></li>
                <li style="list-style: none !important;"><a href="index.html#gallery" class="active">Gallery</a></li>
                <li style="list-style: none !important;"><a href="index.html#publications">Publications</a></li>
                <li style="list-style: none !important;"><a href="index.html#contact">Contact</a></li>
                <li style="list-style: none !important;"><a href="admin-simple.html">Admin</a></li>
            </ul>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <a href="index.html#gallery" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to Gallery
            </a>
            <h1 class="page-title" data-aos="fade-up">기사 및 미디어</h1>
            <p class="page-subtitle" data-aos="fade-up" data-aos-delay="100">기고 기사 & 인터뷰</p>
        </div>
    </section>

    <!-- Gallery Grid -->
    <section class="gallery-detail-section">
        <div class="container">
            <div class="gallery-grid" id="articleGrid">
                <!-- Gallery items loaded dynamically -->
            </div>
        </div>
    </section>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
        <div class="lightbox-caption" id="lightbox-caption"></div>
        <button class="lightbox-prev" id="lightbox-prev">&#10094;</button>
        <button class="lightbox-next" id="lightbox-next">&#10095;</button>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 임형준 Sound Engineer & Producer, Educator. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 800,
            easing: 'ease-in-out',
            once: true
        });

        // Load Article Publications
        async function loadArticlePublications() {
            try {
                const response = await fetch('tables/publications?limit=100&sort=order');
                const data = await response.json();
                
                const articleItems = data.data.filter(item => item.category === 'article');
                renderGallery(articleItems);
            } catch (error) {
                console.error('Error loading article publications:', error);
            }
        }

        function renderGallery(items) {
            const grid = document.getElementById('articleGrid');
            grid.innerHTML = '';

            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'gallery-item';
                card.setAttribute('data-aos', 'fade-up');
                card.setAttribute('data-aos-delay', (index % 6) * 50);
                
                card.innerHTML = `
                    <img src="${item.image_url}" alt="${item.title}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22300%22%3E%3Crect fill=%22%232c2c2c%22 width=%22400%22 height=%22300%22/%3E%3Ctext fill=%22%23d4a574%22 font-size=%2220%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22%3E${item.title}%3C/text%3E%3C/svg%3E'">
                    <div class="gallery-overlay">
                        <div class="gallery-info">
                            <h3>${item.title}</h3>
                            <p>${item.description}</p>
                        </div>
                    </div>
                `;
                
                card.onclick = () => openLightbox(item.image_url, item.title, item.description, index, items);
                grid.appendChild(card);
            });
        }

        // Lightbox functionality
        let currentImageIndex = 0;
        let currentImages = [];

        function openLightbox(src, title, description, index, images) {
            currentImageIndex = index;
            currentImages = images;
            
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            const caption = document.getElementById('lightbox-caption');
            
            img.src = src;
            caption.innerHTML = `<h3>${title}</h3><p>${description}</p>`;
            lightbox.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function navigateLightbox(direction) {
            currentImageIndex += direction;
            if (currentImageIndex < 0) currentImageIndex = currentImages.length - 1;
            if (currentImageIndex >= currentImages.length) currentImageIndex = 0;
            
            const item = currentImages[currentImageIndex];
            document.getElementById('lightbox-img').src = item.image_url;
            document.getElementById('lightbox-caption').innerHTML = `<h3>${item.title}</h3><p>${item.description}</p>`;
        }

        document.querySelector('.lightbox-close').onclick = closeLightbox;
        document.getElementById('lightbox-prev').onclick = () => navigateLightbox(-1);
        document.getElementById('lightbox-next').onclick = () => navigateLightbox(1);
        
        document.getElementById('lightbox').onclick = (e) => {
            if (e.target.id === 'lightbox') closeLightbox();
        };

        // Load publications on page load
        loadArticlePublications();
    </script>
</body>
</html>
