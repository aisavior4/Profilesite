<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board Diagnostic Tool - 임형준</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 28px;
            color: #1a1a1a;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .alert {
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 4px solid;
        }

        .alert-warning {
            background: #fff3cd;
            border-color: #ffc107;
            color: #856404;
        }

        .alert-info {
            background: #cfe2ff;
            border-color: #0d6efd;
            color: #084298;
        }

        .alert-success {
            background: #d1e7dd;
            border-color: #198754;
            color: #0f5132;
        }

        .alert-danger {
            background: #f8d7da;
            border-color: #dc3545;
            color: #842029;
        }

        .btn {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(245, 87, 108, 0.4);
        }

        .btn-success {
            background: #198754;
            color: white;
        }

        .btn-success:hover {
            background: #157347;
        }

        .btn-secondary {
            background: white;
            color: #f5576c;
            border: 2px solid #f5576c;
        }

        .btn-secondary:hover {
            background: #f5576c;
            color: white;
        }

        #results {
            margin-top: 30px;
        }

        .post-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid;
        }

        .post-card.empty-content {
            border-color: #dc3545;
            background: #fff5f5;
        }

        .post-card.has-content {
            border-color: #198754;
            background: #f0fff4;
        }

        .post-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        .post-meta {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
        }

        .post-content-preview {
            font-size: 14px;
            color: #555;
            background: white;
            padding: 12px;
            border-radius: 4px;
            margin-top: 10px;
            max-height: 100px;
            overflow-y: auto;
        }

        .post-actions {
            margin-top: 12px;
            display: flex;
            gap: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .loading i {
            font-size: 48px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>🔍 Board Diagnostic Tool</h1>
        <p class="subtitle">게시판 문제 진단 및 수정 도구</p>

        <div class="alert alert-info">
            <h3 style="margin-bottom: 10px;"><i class="fas fa-info-circle"></i> 문제 원인</h3>
            <p>Board 페이지에서 게시글을 클릭했을 때 제목만 보이고 본문이 비어있는 이유는 <strong>게시글 작성 시 'Content(내용)' 필드가 비어있기 때문</strong>입니다.</p>
        </div>

        <div style="text-align: center; margin-bottom: 30px;">
            <button class="btn btn-primary" onclick="runDiagnostic()">
                <i class="fas fa-stethoscope"></i> 진단 시작
            </button>
            <button class="btn btn-success" onclick="createSamplePost()">
                <i class="fas fa-plus"></i> 샘플 게시글 생성
            </button>
            <button class="btn btn-secondary" onclick="window.location.href='admin-simple.html'">
                관리자 페이지로 이동
            </button>
        </div>

        <div id="stats"></div>
        <div id="results"></div>
    </div>

    <script>
        async function runDiagnostic() {
            const resultsDiv = document.getElementById('results');
            const statsDiv = document.getElementById('stats');
            
            resultsDiv.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i><p style="margin-top: 20px;">게시판 데이터 분석 중...</p></div>';
            statsDiv.innerHTML = '';

            try {
                const response = await fetch('tables/board?limit=100');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                const posts = data.data || [];

                // Statistics
                const totalPosts = posts.length;
                const emptyPosts = posts.filter(p => !p.content || p.content.trim() === '').length;
                const validPosts = totalPosts - emptyPosts;

                // Display stats
                statsDiv.innerHTML = `
                    <div class="stats">
                        <div class="stat-card">
                            <div class="stat-number">${totalPosts}</div>
                            <div class="stat-label">전체 게시글</div>
                        </div>
                        <div class="stat-card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                            <div class="stat-number">${emptyPosts}</div>
                            <div class="stat-label">⚠️ 본문 없는 게시글</div>
                        </div>
                        <div class="stat-card" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);">
                            <div class="stat-number">${validPosts}</div>
                            <div class="stat-label">✅ 정상 게시글</div>
                        </div>
                    </div>
                `;

                // Display alert
                if (emptyPosts > 0) {
                    statsDiv.innerHTML += `
                        <div class="alert alert-warning">
                            <h3 style="margin-bottom: 10px;"><i class="fas fa-exclamation-triangle"></i> 발견된 문제</h3>
                            <p><strong>${emptyPosts}개의 게시글</strong>에 본문 내용이 없습니다. 아래에서 각 게시글을 수정하거나, 관리자 페이지에서 직접 수정해주세요.</p>
                        </div>
                    `;
                } else {
                    statsDiv.innerHTML += `
                        <div class="alert alert-success">
                            <h3 style="margin-bottom: 10px;"><i class="fas fa-check-circle"></i> 모든 게시글 정상</h3>
                            <p>모든 게시글에 본문 내용이 있습니다. 문제가 없습니다!</p>
                        </div>
                    `;
                }

                // Display posts
                if (totalPosts === 0) {
                    resultsDiv.innerHTML = `
                        <div class="alert alert-info">
                            <h3 style="margin-bottom: 10px;"><i class="fas fa-inbox"></i> 게시글 없음</h3>
                            <p>등록된 게시글이 없습니다. 샘플 게시글을 생성하거나 관리자 페이지에서 새 게시글을 작성해주세요.</p>
                        </div>
                    `;
                } else {
                    resultsDiv.innerHTML = '<h3 style="margin-bottom: 20px; color: #1a1a1a;">📋 전체 게시글 목록</h3>';
                    
                    posts.forEach(post => {
                        const hasContent = post.content && post.content.trim() !== '';
                        const contentPreview = hasContent ? post.content.substring(0, 150) : '⚠️ 본문 없음';
                        
                        const postCard = document.createElement('div');
                        postCard.className = `post-card ${hasContent ? 'has-content' : 'empty-content'}`;
                        postCard.innerHTML = `
                            <div class="post-title">
                                ${hasContent ? '<i class="fas fa-check-circle" style="color: #198754;"></i>' : '<i class="fas fa-exclamation-circle" style="color: #dc3545;"></i>'}
                                ${post.title}
                            </div>
                            <div class="post-meta">
                                <i class="fas fa-user"></i> ${post.author || '관리자'} | 
                                <i class="fas fa-calendar"></i> ${new Date(post.created_at).toLocaleDateString('ko-KR')} | 
                                <i class="fas fa-eye"></i> ${post.views || 0} views
                            </div>
                            <div class="post-content-preview">${contentPreview}${hasContent && post.content.length > 150 ? '...' : ''}</div>
                            <div class="post-actions">
                                ${!hasContent ? `
                                    <button class="btn btn-primary" onclick="fixPost('${post.id}', '${post.title.replace(/'/g, "\\'")}')">
                                        <i class="fas fa-wrench"></i> 지금 수정하기
                                    </button>
                                ` : ''}
                                <button class="btn btn-secondary" onclick="window.open('admin-simple.html', '_blank')">
                                    <i class="fas fa-edit"></i> 관리자 페이지에서 수정
                                </button>
                            </div>
                        `;
                        resultsDiv.appendChild(postCard);
                    });
                }

            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="alert alert-danger">
                        <h3 style="margin-bottom: 10px;"><i class="fas fa-times-circle"></i> 오류 발생</h3>
                        <p>데이터를 불러오는 중 오류가 발생했습니다: ${error.message}</p>
                    </div>
                `;
            }
        }

        async function fixPost(postId, postTitle) {
            const content = prompt(`"${postTitle}" 게시글의 본문 내용을 입력하세요:`, '');
            
            if (content === null || content.trim() === '') {
                alert('❌ 본문 내용을 입력해주세요.');
                return;
            }

            try {
                const response = await fetch(`tables/board/${postId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: content.trim() })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                alert('✅ 게시글이 성공적으로 수정되었습니다!');
                runDiagnostic(); // Refresh
            } catch (error) {
                alert(`❌ 수정 실패: ${error.message}`);
            }
        }

        async function createSamplePost() {
            const samplePosts = [
                {
                    title: '🎉 게시판 오픈 안내',
                    content: '안녕하세요! 임형준 프로필 사이트의 게시판이 오픈되었습니다.\n\n이 게시판에서는 다음과 같은 내용을 공유할 예정입니다:\n\n✅ 최신 프로젝트 소식\n✅ 음향 관련 팁과 노하우\n✅ 교육 일정 안내\n✅ 기타 공지사항\n\n많은 관심 부탁드립니다!',
                    author: '관리자',
                    category: '공지사항',
                    is_pinned: true,
                    views: 0
                },
                {
                    title: 'Pro Tools 2024 최신 업데이트 정보',
                    content: 'AVID Pro Tools 2024.3 버전이 출시되었습니다.\n\n주요 업데이트 내용:\n\n🎵 Dolby ATMOS 렌더링 성능 개선\n🎵 Clip Gain 기능 강화\n🎵 신규 플러그인 추가\n🎵 안정성 개선 및 버그 수정\n\n자세한 내용은 AVID 공식 홈페이지를 참조해주세요.',
                    author: '임형준',
                    category: '기술정보',
                    is_pinned: false,
                    views: 0
                }
            ];

            for (const post of samplePosts) {
                try {
                    const response = await fetch('tables/board', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(post)
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    console.log(`✅ Created: ${post.title}`);
                } catch (error) {
                    console.error(`❌ Failed: ${post.title}`, error);
                }
            }

            alert('✅ 샘플 게시글 2개가 생성되었습니다!');
            runDiagnostic();
        }

        // Auto-run on load
        window.addEventListener('DOMContentLoaded', () => {
            runDiagnostic();
        });
    </script>
</body>
</html>
