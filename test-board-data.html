<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board 데이터 확인</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background: #f5f5f5; padding: 40px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; }
        h1 { margin-bottom: 30px; color: #333; }
        .btn { padding: 15px 30px; background: #d4a574; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 700; margin: 10px 5px; }
        .btn-danger { background: #dc3545; }
        .log { background: #f9f9f9; padding: 20px; border-radius: 6px; margin-top: 20px; max-height: 500px; overflow-y: auto; font-family: monospace; font-size: 13px; border: 1px solid #e5e5e5; }
        .post-card { background: #f9f9f9; padding: 20px; border-radius: 8px; margin: 15px 0; border-left: 4px solid #d4a574; }
        .post-card h3 { margin-bottom: 10px; color: #333; }
        .post-card .meta { font-size: 12px; color: #999; margin-bottom: 10px; }
        .post-card .content { background: white; padding: 15px; border-radius: 6px; margin-top: 10px; white-space: pre-wrap; }
        .warning { background: #fff3cd; padding: 15px; border-radius: 6px; margin: 20px 0; border: 2px solid #ffc107; color: #856404; }
        .empty { color: #dc3545; font-weight: 700; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Board 게시글 데이터 확인</h1>
        
        <div class="warning">
            <strong>⚠️ 이 페이지는 Board 게시글이 왜 안 보이는지 확인합니다.</strong><br>
            "데이터 확인" 버튼을 클릭하여 실제 데이터베이스의 게시글을 확인하세요.
        </div>

        <button class="btn" onclick="checkData()">📊 데이터 확인</button>
        <button class="btn btn-danger" onclick="createSamplePost()">➕ 샘플 게시글 생성</button>

        <div id="result"></div>
        <div id="log" class="log" style="display: none;"></div>
    </div>

    <script>
        function log(message) {
            const logDiv = document.getElementById('log');
            logDiv.style.display = 'block';
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<div>[${time}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }

        async function checkData() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>데이터 로딩 중...</p>';
            log('📥 Board 데이터 가져오는 중...');

            try {
                const response = await fetch('tables/board?limit=100');
                const data = await response.json();

                log(`✅ 응답 성공: ${response.status}`);
                log(`📊 총 게시글 수: ${data.data?.length || 0}`);

                if (!data.data || data.data.length === 0) {
                    resultDiv.innerHTML = `
                        <div class="warning">
                            <h3>⚠️ 게시글이 하나도 없습니다!</h3>
                            <p>아래 "샘플 게시글 생성" 버튼을 클릭하여 테스트 게시글을 만드세요.</p>
                        </div>
                    `;
                    log('⚠️ 게시글 0개 - 데이터가 비어있음');
                    return;
                }

                // 각 게시글 표시
                let html = '<h2>📋 게시글 목록 (총 ' + data.data.length + '개)</h2>';
                
                data.data.forEach((post, index) => {
                    const hasContent = post.content && post.content.trim() !== '';
                    const contentPreview = hasContent 
                        ? post.content.substring(0, 100) + (post.content.length > 100 ? '...' : '')
                        : '<span class="empty">❌ 본문 없음!</span>';

                    html += `
                        <div class="post-card">
                            <h3>${index + 1}. ${post.title}</h3>
                            <div class="meta">
                                작성자: ${post.author || '관리자'} | 
                                날짜: ${new Date(post.created_at).toLocaleDateString()} |
                                조회수: ${post.views || 0}
                            </div>
                            <div class="content">
                                <strong>본문 내용:</strong><br>
                                ${contentPreview}
                            </div>
                            ${!hasContent ? '<p class="empty">⚠️ 이 게시글은 admin에서 본문을 추가해야 합니다!</p>' : ''}
                        </div>
                    `;

                    log(`게시글 #${index + 1}: "${post.title}" - 본문 ${hasContent ? '있음 ✅' : '없음 ❌'}`);
                });

                resultDiv.innerHTML = html;

                // 요약
                const emptyPosts = data.data.filter(p => !p.content || p.content.trim() === '').length;
                if (emptyPosts > 0) {
                    resultDiv.innerHTML += `
                        <div class="warning">
                            <h3>⚠️ 주의!</h3>
                            <p><strong>${emptyPosts}개</strong>의 게시글에 본문이 없습니다!</p>
                            <p>admin-simple.html → "게시판" 탭 → 해당 게시글 "수정" → "내용" 필드 작성 → "저장"</p>
                        </div>
                    `;
                }

            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="warning">
                        <h3>❌ 에러 발생!</h3>
                        <p>${error.message}</p>
                    </div>
                `;
                log('❌ 에러: ' + error.message);
            }
        }

        async function createSamplePost() {
            log('📝 샘플 게시글 생성 중...');

            const samplePost = {
                title: "테스트 게시글 - " + new Date().toLocaleString(),
                content: `안녕하세요, 임형준입니다.

이것은 테스트 게시글입니다.

• 이렇게 본문 내용을 작성하면
• board.html에서 정상적으로 표시됩니다.

감사합니다.`,
                author: "관리자",
                category: "공지사항",
                views: 0,
                is_pinned: true
            };

            try {
                const response = await fetch('tables/board', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(samplePost)
                });

                if (response.ok) {
                    const data = await response.json();
                    log('✅ 샘플 게시글 생성 성공!');
                    log('게시글 ID: ' + data.id);
                    alert('✅ 샘플 게시글이 생성되었습니다!\n\nboard.html을 열어서 확인해보세요.');
                    checkData(); // 재확인
                } else {
                    log('❌ 생성 실패: ' + response.status);
                    alert('❌ 게시글 생성 실패: ' + response.status);
                }
            } catch (error) {
                log('❌ 에러: ' + error.message);
                alert('❌ 에러: ' + error.message);
            }
        }
    </script>
</body>
</html>
