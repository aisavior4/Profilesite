        document.getElementById('importBtn').addEventListener('click', async function() {
            if (!confirm('원본 이력서 데이터 51개 항목을 Import 하시겠습니까?\n\n※ 있는 그대로 Import됩니다 (추가/수정 없음)')) {
                return;
            }

            const btn = this;
            btn.disabled = true;
            btn.textContent = 'Import 진행 중...';

            const progressContainer = document.getElementById('progressContainer');
            const progressFill = document.getElementById('progressFill');
            const status = document.getElementById('status');

            progressContainer.style.display = 'block';
            status.textContent = 'Import를 시작합니다...';

            let successCount = 0;
            let failCount = 0;

            for (let i = 0; i < resumeData.length; i++) {
                const item = resumeData[i];
                const progress = Math.round(((i + 1) / resumeData.length) * 100);
                
                progressFill.style.width = progress + '%';
                progressFill.textContent = progress + '%';
                status.textContent = `${i + 1}/${resumeData.length} - ${item.title} Import 중...`;

                try {
                    const response = await fetch('tables/resume', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(item)
                    });

                    if (response.ok) {
                        successCount++;
                    } else {
                        failCount++;
                        console.error(`Failed to import: ${item.title}`);
                    }
                } catch (error) {
                    failCount++;
                    console.error(`Error importing ${item.title}:`, error);
                }

                // 서버 부하 방지를 위한 짧은 딜레이
                await new Promise(resolve => setTimeout(resolve, 100));
            }

            progressFill.style.width = '100%';
            progressFill.textContent = '100%';
            
            if (failCount === 0) {
                status.className = 'status success';
                status.innerHTML = `
                    ✅ Import 완료!<br>
                    성공: ${successCount}개 / 실패: ${failCount}개<br><br>
                    <a href="admin-simple.html" class="link-btn">관리자 페이지에서 확인하기</a>
                    <a href="resume.html" class="link-btn" style="background: #667eea; margin-left: 10px;">Resume 페이지 확인하기</a>
                `;
            } else {
                status.className = 'status error';
                status.innerHTML = `
                    ⚠️ Import 완료 (일부 실패)<br>
                    성공: ${successCount}개 / 실패: ${failCount}개<br><br>
                    <a href="admin-simple.html" class="link-btn">관리자 페이지에서 확인하기</a>
                `;
            }

            btn.textContent = 'Import 완료';
        });
