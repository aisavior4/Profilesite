<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>누락 항목 추가</title>
    <style>
        body { font-family: Arial; padding: 50px; text-align: center; background: #f5f5f5; }
        h1 { color: #333; margin-bottom: 10px; }
        .info { background: #fff3cd; padding: 15px; margin: 20px auto; max-width: 600px; border-radius: 8px; border-left: 4px solid #ffc107; }
        .btn { padding: 20px 40px; font-size: 18px; background: #667eea; color: white; border: none; border-radius: 10px; cursor: pointer; margin: 10px; }
        .btn:hover { background: #5568d3; }
        #status { margin-top: 30px; font-size: 16px; color: #666; }
        .success { color: #10b981; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>
    <h1>🔧 누락 항목 추가</h1>
    <div class="info">
        <strong>추가될 항목:</strong><br>
        • 자격증 세부 3개 (Dante 관련)<br>
        • 사회경력 9개 (13-21번)
    </div>
    
    <button class="btn" onclick="addMissing()">12개 항목 추가하기</button>
    
    <div id="status"></div>

    <script>
        async function addMissing() {
            const status = document.getElementById('status');
            status.innerHTML = '추가 중...';
            
            const missingData = [
                // 자격증 세부 11-13번
                {category: 'certification', title: 'Dante International Trainer', subtitle: '국제공인인스트럭터, 국내 5인중 1인', date: '', description: '', order: 111, is_featured: false},
                {category: 'certification', title: 'Dante Certification Level 2', subtitle: '', date: '', description: '', order: 112, is_featured: false},
                {category: 'certification', title: 'Dante Certification Level 1', subtitle: '', date: '', description: '', order: 113, is_featured: false},
                
                // 사회경력 13-21번
                {category: 'experience', title: '한국방송아카데미 음향과 출강', subtitle: '현 한국방송예술진흥원', date: '1998~2003', description: '', order: 13, is_featured: false},
                {category: 'experience', title: '글로벌 음악오픈마켓 eMUSICMARKET.com', subtitle: '대표', date: '2012~현재', description: '', order: 14, is_featured: false},
                {category: 'experience', title: '사운드캣 캣츠코 음향연구소', subtitle: '감독', date: '2019~2021', description: '', order: 15, is_featured: false},
                {category: 'experience', title: 'AIM Recording Studio / Mastering Studio / Entertainment', subtitle: '대표', date: '2000~2011', description: '', order: 16, is_featured: false},
                {category: 'experience', title: '광화문 AIM 레코딩 스튜디오', subtitle: '총감독', date: '2011~2014', description: '', order: 17, is_featured: false},
                {category: 'experience', title: '코아 레코딩 스튜디오', subtitle: '레코딩엔지니어', date: '1998~2000', description: '', order: 18, is_featured: false},
                {category: 'experience', title: '호주 시드니 Alberts Studio', subtitle: 'In-House 엔지니어', date: '1997~1998', description: '', order: 19, is_featured: false},
                {category: 'experience', title: '음향전문지 PA (Professional Audio)', subtitle: '창간 멤버 및 필진', date: '2000~2022', description: '', order: 20, is_featured: false},
                {category: 'experience', title: '음향전문지 Sound Art', subtitle: '호주리포터, 수석기자', date: '1997~1998', description: '', order: 21, is_featured: false}
            ];
            
            let success = 0;
            for (let i = 0; i < missingData.length; i++) {
                status.innerHTML = `추가 중... ${i+1}/${missingData.length}`;
                try {
                    const res = await fetch('tables/resume', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(missingData[i])
                    });
                    if (res.ok) success++;
                    await new Promise(r => setTimeout(r, 100));
                } catch (e) {
                    console.error(e);
                }
            }
            
            status.className = 'success';
            status.innerHTML = `
                ✅ 완료! ${success}개 항목 추가됨<br><br>
                <div style="margin-top: 20px;">
                    <a href="admin-simple.html" style="display: inline-block; padding: 15px 30px; background: #10b981; color: white; text-decoration: none; border-radius: 8px; font-weight: bold;">관리자 페이지 확인</a>
                    <a href="resume.html" style="display: inline-block; padding: 15px 30px; background: #667eea; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; margin-left: 10px;">Resume 확인</a>
                </div>
            `;
        }
    </script>
</body>
</html>
