<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>빠른 수정</title>
    <style>
        body { font-family: Arial; padding: 50px; text-align: center; background: #f5f5f5; }
        h1 { color: #333; }
        .btn { padding: 20px 40px; font-size: 18px; background: #667eea; color: white; border: none; border-radius: 10px; cursor: pointer; margin: 10px; }
        .btn:hover { background: #5568d3; }
        #status { margin-top: 30px; font-size: 16px; color: #666; }
        .success { color: #10b981; font-weight: bold; }
    </style>
</head>
<body>
    <h1>빠른 수정 - 학력 5개 + 사회경력 12개 추가</h1>
    <p>현재 누락된 17개 항목을 추가합니다</p>
    
    <button class="btn" onclick="addMissing()">누락된 항목 추가하기</button>
    
    <div id="status"></div>

    <script>
        async function addMissing() {
            const status = document.getElementById('status');
            status.innerHTML = '추가 중...';
            
            const missingData = [
                // 학력 5개
                {category: 'education', title: '음악학 박사 - 실용음악 전공', subtitle: '세종대학교 일반대학원 음악학과', date: '', description: '', order: 1, is_featured: false},
                {category: 'education', title: '실용음악학 석사 - 뮤직프로듀싱 전공', subtitle: '추계예술대 문화예술대학원 컨템포러리뮤직 학과', date: '', description: '', order: 2, is_featured: false},
                {category: 'education', title: 'Certificate IV - Audio Engineering & Sound Production', subtitle: 'SAE (School of Audio Engineering), Sydney, Australia', date: '', description: '', order: 3, is_featured: false},
                {category: 'education', title: 'Diploma - Audio Engineering & Post production', subtitle: 'SAE (School of Audio Engineering), Sydney, Australia', date: '', description: '', order: 4, is_featured: false},
                {category: 'education', title: 'Advanced Certificate - Audio Engineering', subtitle: 'JMC Audio Engineering Academy, Sydney, Australia', date: '', description: '', order: 5, is_featured: false},
                
                // 사회경력 1-12 (누락된 부분)
                {category: 'experience', title: '사단법인 한국 음향학회', subtitle: '현 산학협동 이사', date: '2023~현재', description: '', order: 1, is_featured: false},
                {category: 'experience', title: '사단법인 한국 음향예술인 협회', subtitle: '제9대 회장', date: '2018~2022', description: '', order: 2, is_featured: false},
                {category: 'experience', title: '사단법인 한국 음향예술인 협회', subtitle: '기획이사', date: '2007~2018', description: '', order: 3, is_featured: false},
                {category: 'experience', title: '사단법인 한국 음악스튜디오 협회', subtitle: '부회장', date: '2011~2020', description: '', order: 4, is_featured: false},
                {category: 'experience', title: '세계음악학회', subtitle: '정회원', date: '2023~현재', description: '', order: 5, is_featured: false},
                {category: 'experience', title: '세종대학교 음악학과 레코딩, 믹싱, 음향 출강', subtitle: '', date: '2023~현재', description: '', order: 6, is_featured: false},
                {category: 'experience', title: '세종대학교 융합대학원 음향 출강', subtitle: '', date: '2025~현재', description: '', order: 7, is_featured: false},
                {category: 'experience', title: '한국영상대학교 음향제작과', subtitle: '겸임교수', date: '2024~현재', description: '', order: 8, is_featured: false},
                {category: 'experience', title: 'SJA Music Institute 음향 강사', subtitle: '', date: '2025~현재', description: '', order: 9, is_featured: false},
                {category: 'experience', title: '한국예술원 음향제작과', subtitle: '전임교수', date: '2018~2024', description: '', order: 10, is_featured: false},
                {category: 'experience', title: '한국예술원 음향제작과', subtitle: '겸임교수', date: '2013~2017', description: '', order: 11, is_featured: false},
                {category: 'experience', title: '서울 종합예술학교 실용음악과 음향 출강', subtitle: '', date: '2009~2015', description: '', order: 12, is_featured: false}
            ];
            
            let success = 0;
            for (let i = 0; i < missingData.length; i++) {
                try {
                    const res = await fetch('tables/resume', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(missingData[i])
                    });
                    if (res.ok) success++;
                    await new Promise(r => setTimeout(r, 100));
                } catch (e) {
                    console.error(e);
                }
            }
            
            status.className = 'success';
            status.innerHTML = `완료! ${success}개 항목 추가됨<br><br><a href="admin-simple.html" style="color: #667eea; font-weight: bold;">관리자 페이지로 이동</a>`;
        }
    </script>
</body>
</html>
